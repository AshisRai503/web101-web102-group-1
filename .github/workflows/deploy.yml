name: CI/CD Pipeline - Task Manager

# Trigger this pipeline on every push to main branch
on:
  push:
    branches: ["main"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get the code
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Login to DockerHub using GitHub Secrets
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Step 3: Set up Docker Buildx for cross-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Build and push backend image to DockerHub
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/be-taskmanager:latest

      # Step 5: Build and push frontend image to DockerHub
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./task-manager
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/fe-taskmanager:latest

      # Step 6: Trigger Render to deploy both services
      - name: Trigger Render Backend Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_BACKEND }}

      - name: Trigger Render Frontend Deployment
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_FRONTEND }}
      
